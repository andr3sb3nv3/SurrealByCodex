openapi: 3.1.0
info:
  title: Surreal Check-in API
  version: "1.0.0"
servers:
  - url: https://us-central1-<YOUR_PROJECT_ID>.cloudfunctions.net
paths:
  /checkin:
    post:
      operationId: createOrUpdateDailyCheckin
      summary: Crea o actualiza un check-in diario con métricas dinámicas.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckinRequest"
      responses:
        "200":
          description: Check-in guardado correctamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  path:
                    type: string
                required: [ok, path]
        "400":
          description: Error de validación.
        "401":
          description: No autorizado.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: CHECKIN_API_KEY
  schemas:
    CheckinRequest:
      type: object
      additionalProperties: false
      properties:
        user_id:
          type: string
          minLength: 1
        fecha:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Fecha en formato YYYY-MM-DD.
        metrics:
          type: object
          description: Objeto dinámico de métricas por usuario.
          additionalProperties:
            anyOf:
              - type: number
                minimum: 1
                maximum: 10
              - type: "null"
        goals:
          type: object
          nullable: true
          description: Objeto dinámico de objetivos diarios.
          additionalProperties:
            anyOf:
              - type: boolean
              - type: "null"
        reflection:
          type: string
          description: Puede ser un string vacío.
        summary:
          anyOf:
            - type: "null"
            - type: object
              additionalProperties: false
              properties:
                positive: { type: string }
                challenge: { type: string }
                next_step: { type: string }
                mood_note: { type: string }
        source:
          type: string
          enum: [chatgpt]
      required:
        - user_id
        - fecha
        - metrics
        - source
